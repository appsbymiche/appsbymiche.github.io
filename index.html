<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Portfolio | Innovative Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        // --- EDIT YOUR APPS HERE ---
        const apps = [
            {
                title: "Pantry Pals",
                description: "AI-powered kitchen inventory management with smart barcode scanning and recipe generation.",
                tags: ["React Native", "Node.js", "AI"],
                links: { ios: "https://apps.apple.com/...", android: "https://play.google.com/..." },
                featured: true,
                icon: "🍳",
                image: "pantry-pals-icon.jpg" // Put this file in the same folder
            },
            {
                title: "Aurallytics",
                description: "Brand sentiment analysis and narrative summaries using high-fidelity audio processing.",
                tags: ["TypeScript", "MongoDB", "Sentiment Analysis"],
                links: { web: "#" },
                featured: false,
                icon: "📊" 
                // No image property = defaults to icon
            },
            {
                title: "PocketPet",
                description: "A virtual pet experience focused on cross-platform synchronization and offline-first data.",
                tags: ["SQLite", "Expo", "2D Graphics"],
                links: { web: "#" },
                featured: false,
                icon: "🐾",
                image: "pocketpet.jpeg"
            }
        ];

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neural: {
                            bg: '#0F172A',
                            card: '#1E293B',
                            accent: '#38BDF8',
                            text: '#F8FAFC'
                        }
                    }
                }
            }
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        // Helper function to render Image or Emoji Icon
        function renderIcon(app, sizeClasses) {
            if (app.image) {
                return `<img src="${app.image}" alt="${app.title} icon" class="${sizeClasses} object-cover rounded-3xl shadow-lg">`;
            }
            return `<div class="${sizeClasses} bg-sky-500 rounded-3xl flex items-center justify-center text-4xl shadow-lg">${app.icon}</div>`;
        }

        window.onload = () => {
            const grid = document.getElementById('apps-grid');
            const featuredContainer = document.getElementById('featured-app');
            
            apps.forEach(app => {
                // Render Featured Hero App
                if (app.featured) {
                    featuredContainer.innerHTML = `
                        <div class="bg-white dark:bg-neural-card border border-slate-200 dark:border-slate-700 rounded-[2.5rem] shadow-2xl p-8 md:p-12 text-left app-shadow">
                            <div class="flex flex-col md:flex-row gap-8 items-center">
                                ${renderIcon(app, "w-24 h-24")}
                                <div class="flex-1">
                                    <span class="text-sky-500 font-bold uppercase tracking-widest text-xs">Featured Project</span>
                                    <h2 class="text-3xl font-extrabold mt-2 mb-4 dark:text-white">${app.title}</h2>
                                    <p class="text-slate-600 dark:text-slate-400 mb-6 text-lg">${app.description}</p>
                                    <div class="flex gap-2">
                                        ${app.tags.map(t => `<span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-full text-xs font-semibold">${t}</span>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // Render Grid
                const card = document.createElement('div');
                card.className = "p-8 rounded-3xl bg-white dark:bg-neural-card border border-slate-200 dark:border-slate-700 hover:border-sky-500 transition-all group";
                card.innerHTML = `
                    <div class="mb-6 group-hover:scale-110 transition-transform inline-block">
                        ${renderIcon(app, "w-16 h-16")}
                    </div>
                    <h3 class="text-xl font-bold mb-3 dark:text-white">${app.title}</h3>
                    <p class="text-slate-600 dark:text-slate-400 mb-6 text-sm">${app.description}</p>
                    <div class="flex flex-wrap gap-2 mb-4">
                         ${app.tags.map(t => `<span class="text-[10px] uppercase font-bold text-slate-400">${t}</span>`).join(' • ')}
                    </div>
                `;
                grid.appendChild(card);
            });
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(15, 23, 42, 0.9); border-color: rgba(51, 65, 85, 1); }
        .app-shadow { box-shadow: 0 20px 50px -12px rgba(56, 189, 248, 0.1); }
        .dark .app-shadow { box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.6); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-neural-bg dark:text-neural-text">

    <nav class="fixed w-full z-50 glass border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-slate-900 dark:bg-white rounded-lg flex items-center justify-center">
                    <div class="w-3 h-3 bg-sky-500 rounded-full"></div>
                </div>
                <span class="text-xl font-bold tracking-tight dark:text-white">Apps By Miche & AI</span>
            </div>
            <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-sky-400 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6 tracking-tight dark:text-white">
                Building the <span class="text-sky-500 font-mono">future</span> of software.
            </h1>
            <p class="text-xl text-slate-600 dark:text-slate-400 max-w-2xl mx-auto mb-16">
                A studio dedicated to crafting high-performance, AI-integrated mobile and web applications.
            </p>

            <div id="featured-app" class="relative max-w-5xl mx-auto mb-24"></div>

            <div class="text-left mb-12">
                <h2 class="text-2xl font-bold dark:text-white">Product Ecosystem</h2>
                <div class="h-1 w-12 bg-sky-500 mt-2"></div>
            </div>
            
            <div id="apps-grid" class="grid md:grid-cols-3 gap-8 text-left"></div>
        </div>
    </section>

    <footer class="py-12 border-t border-slate-200 dark:border-slate-800 mt-20">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center text-slate-500 text-xs font-medium uppercase tracking-widest">
            <span>&copy; 2026 Apps by Miche & AI</span>
            <div class="flex space-x-6">
                <a href="mailto:hello@neurallabs.ca" class="hover:text-sky-500">Contact</a>
                <a href="#" class="hover:text-sky-500">Github</a>
            </div>
        </div>
    </footer>

</body>
</html>
