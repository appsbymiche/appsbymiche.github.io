<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Innovative Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="data.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' };

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = src;
            lb.classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const projectName = params.get('name');
            const app = apps.find(a => a.title === projectName);
    
            if (!app || app.status === "soon") {
                document.body.innerHTML = "<div class='p-20 text-center text-slate-500'>Project not found. <a href='index.html' class='text-sky-500 underline'>Go back</a></div>";
                return;
            }

            document.getElementById('app-title').innerText = app.title;
            document.getElementById('app-desc').innerText = app.fullDescription || app.description;
            
            document.getElementById('app-icon-container').innerHTML = app.image 
                ? `<img src="${app.image}" class="w-32 h-32 rounded-3xl object-cover shadow-2xl">`
                : `<div class="w-32 h-32 bg-sky-500 rounded-3xl flex items-center justify-center text-6xl shadow-2xl">${app.icon}</div>`;

            // Render Links
            const linksContainer = document.getElementById('links-container');
            if (app.links.ios) linksContainer.innerHTML += `<a target="_blank" href="${app.links.ios}" class="bg-black text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-800 transition text-sm">App Store</a>`;
            if (app.links.android) linksContainer.innerHTML += `<a target="_blank" href="${app.links.android}" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-green-700 transition text-sm">Google Play</a>`;
            if (app.links.web && app.links.web !== "#") linksContainer.innerHTML += `<a target="_blank" href="${app.links.web}" class="border-2 border-slate-200 dark:border-slate-700 dark:text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-800 transition text-sm">Web App</a>`;

            // Render Tech Stack Sidebar
            const techList = document.getElementById('tech-stack-list');
            if (app.tech && app.tech.length > 0) {
                app.tech.forEach(t => {
                    const item = document.createElement('div');
                    item.className = "flex items-center gap-3 p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 shadow-sm";
                    item.innerHTML = `<span class="w-2 h-2 rounded-full bg-sky-500"></span><span class="text-sm font-semibold text-slate-700 dark:text-slate-300">${t}</span>`;
                    techList.appendChild(item);
                });
            } else {
                document.getElementById('tech-sidebar').classList.add('hidden');
            }

            // Render Screenshots
            const screenshotGrid = document.getElementById('screenshot-grid');
            if (app.screenshots && app.screenshots.length > 0) {
                app.screenshots.forEach(src => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = "h-[450px] w-auto rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700 cursor-zoom-in hover:opacity-90 transition shrink-0";
                    img.onclick = () => openLightbox(src);
                    screenshotGrid.appendChild(img);
                });
            } else {
                document.getElementById('gallery-section').classList.add('hidden');
            }
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        #screenshot-grid::-webkit-scrollbar { display: none; }
        #screenshot-grid { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors dark:bg-slate-950 dark:text-slate-100">
    
    <div id="lightbox" class="hidden fixed inset-0 z-[100] bg-black/90 backdrop-blur-sm items-center justify-center p-4" onclick="closeLightbox()">
        <button class="absolute top-6 right-6 text-white text-5xl font-light">&times;</button>
        <img id="lightbox-img" class="max-h-full max-w-full rounded-lg shadow-2xl" src="">
    </div>

    <nav class="p-6 max-w-7xl mx-auto">
        <a href="index.html" class="text-sm font-bold text-slate-400 hover:text-sky-500 flex items-center gap-2 transition">
            ← BACK TO PROJECTS
        </a>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-10 pb-24">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
            
            <div class="lg:col-span-8">
                <div class="flex flex-col sm:flex-row items-center sm:items-start gap-8 mb-12">
                    <div id="app-icon-container" class="shrink-0"></div>
                    <div class="text-center sm:text-left">
                        <h1 id="app-title" class="text-5xl font-black mb-4 tracking-tight"></h1>
                        <div id="links-container" class="flex flex-wrap gap-3 justify-center sm:justify-start"></div>
                    </div>
                </div>

                <div class="prose prose-slate dark:prose-invert max-w-none mb-16">
                    <h3 class="text-xl font-bold mb-4">Project Overview</h3>
                    <p id="app-desc" class="text-lg text-slate-600 dark:text-slate-400 leading-relaxed"></p>
                </div>

                <section id="gallery-section" class="pt-10 border-t border-slate-200 dark:border-slate-800">
                    <h3 class="text-xl font-bold mb-8">Interface Gallery</h3>
                    <div id="screenshot-grid" class="flex gap-6 overflow-x-auto pb-6"></div>
                </section>
            </div>

            <aside id="tech-sidebar" class="lg:col-span-4">
                <div class="sticky top-24">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Technologies Used</h3>
                    <div id="tech-stack-list" class="grid grid-cols-1 gap-3">
                        </div>
                    
                    <div class="mt-12 p-6 rounded-2xl bg-sky-500/10 border border-sky-500/20">
                        <h4 class="text-sky-500 font-bold mb-2">Interested in this tech?</h4>
                        <p class="text-sm text-slate-600 dark:text-slate-400 mb-4">I specialize in building scalable applications using these modern stacks.</p>
                        <a href="mailto:hello@neurallabs.ca" class="text-sm font-bold text-sky-500 hover:underline">Start a conversation →</a>
                    </div>
                </div>
            </aside>

        </div>
    </main>
</body>
</html>
